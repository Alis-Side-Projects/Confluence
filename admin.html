<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Confluence Analytics</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-muted: #8888a0;
    --accent1: #6c5ce7;
    --accent2: #00cec9;
    --accent3: #fd79a8;
    --yellow: #feca57;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px;
  }
  .header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 32px; flex-wrap: wrap; gap: 16px;
  }
  .header h1 {
    font-size: 1.8rem; font-weight: 800;
    background: linear-gradient(135deg, #6c5ce7, #00cec9);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
  }
  .refresh-btn {
    padding: 8px 20px; border-radius: 8px; border: 1px solid var(--border);
    background: var(--surface); color: var(--text); cursor: pointer;
    font-size: 0.9rem; transition: all 0.2s;
  }
  .refresh-btn:hover { border-color: var(--accent1); background: var(--surface2); }
  .stats-row { display: flex; gap: 16px; margin-bottom: 32px; flex-wrap: wrap; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 20px 24px; flex: 1; min-width: 130px;
  }
  .stat-card .label {
    font-size: 0.75rem; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 4px;
  }
  .stat-card .value { font-size: 1.8rem; font-weight: 800; }
  .stat-card .value.purple { color: var(--accent1); }
  .stat-card .value.teal { color: var(--accent2); }
  .stat-card .value.pink { color: var(--accent3); }
  .stat-card .value.yellow { color: var(--yellow); }
  .table-wrapper {
    overflow-x: auto; border: 1px solid var(--border);
    border-radius: 12px; background: var(--surface);
  }
  table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
  th {
    text-align: left; padding: 14px 16px; background: var(--surface2);
    color: var(--text-muted); font-weight: 700; font-size: 0.75rem;
    text-transform: uppercase; letter-spacing: 0.06em;
    white-space: nowrap; border-bottom: 1px solid var(--border);
  }
  td { padding: 12px 16px; border-bottom: 1px solid var(--border); white-space: nowrap; }
  tr:last-child td { border-bottom: none; }
  .session-row { cursor: pointer; transition: background 0.15s; }
  .session-row:hover td { background: rgba(108,92,231,0.06); }
  .session-row td:first-child::before {
    content: '▶'; font-size: 0.7rem; margin-right: 8px; color: var(--text-muted);
    display: inline-block; transition: transform 0.2s;
  }
  .session-row.expanded td:first-child::before { transform: rotate(90deg); }
  .ip-cell { color: var(--accent2); font-family: monospace; }
  .time-cell { color: var(--text-muted); }
  .page-cell {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.78rem; background: rgba(108,92,231,0.1); color: #a78bfa;
  }
  .os-cell { color: var(--accent3); }
  .browser-cell { color: var(--accent2); }
  .detail-row { display: none; }
  .detail-row.show { display: table-row; }
  .detail-row td {
    padding: 0 16px 16px 48px; background: rgba(108,92,231,0.02);
    border-bottom: 1px solid var(--border);
  }
  .detail-panel { padding: 16px 0; }
  .detail-panel h4 {
    font-size: 0.85rem; color: var(--accent1); margin-bottom: 12px;
    text-transform: uppercase; letter-spacing: 0.05em;
  }
  .event-list { list-style: none; }
  .event-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 12px; border-radius: 8px; margin-bottom: 4px;
    background: var(--surface2); font-size: 0.85rem;
  }
  .ev-icon {
    width: 28px; height: 28px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.8rem; flex-shrink: 0;
  }
  .ev-pageview .ev-icon { background: rgba(108,92,231,0.15); }
  .ev-click .ev-icon { background: rgba(0,206,201,0.15); }
  .ev-leave .ev-icon { background: rgba(253,121,168,0.15); }
  .ev-time { color: var(--text-muted); font-size: 0.78rem; margin-left: auto; white-space: nowrap; }
  .ev-detail { color: var(--text); }
  .ev-duration {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.75rem; font-weight: 600;
    background: rgba(253,121,168,0.1); color: var(--accent3);
  }
  .ev-click-name {
    display: inline-block; padding: 2px 8px; border-radius: 4px;
    font-size: 0.75rem; background: rgba(0,206,201,0.1); color: var(--accent2);
  }
  .no-events { color: var(--text-muted); font-size: 0.85rem; font-style: italic; }
  .loading { text-align: center; padding: 40px; color: var(--text-muted); }
  .empty-state { text-align: center; padding: 60px 20px; color: var(--text-muted); }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Confluence Analytics</h1>
  <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</div>

<div class="stats-row">
  <div class="stat-card"><div class="label">Total Sessions</div><div class="value purple" id="totalVisits">—</div></div>
  <div class="stat-card"><div class="label">Today</div><div class="value teal" id="todayVisits">—</div></div>
  <div class="stat-card"><div class="label">Unique IPs</div><div class="value pink" id="uniqueIPs">—</div></div>
  <div class="stat-card"><div class="label">Link Clicks</div><div class="value yellow" id="totalClicks">—</div></div>
</div>

<div class="table-wrapper">
  <div class="loading" id="loadingState">Loading analytics...</div>
  <table id="visitorTable" style="display:none;">
    <thead>
      <tr>
        <th>#</th><th>IP Address</th><th>Date</th><th>Time</th>
        <th>Entry Page</th><th>Browser</th><th>OS</th><th>Pages</th><th>Clicks</th>
      </tr>
    </thead>
    <tbody id="visitorRows"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">👀</div><p>No visitors yet.</p>
  </div>
</div>

<script>
var SHEET_ID = '1_CiIlQat2JN7YzbkY83Kbjq76zBjVFdcbm1tZFRdNHw';

function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

async function loadAll() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('visitorTable').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  try {
    // Fetch Sheet1 (all rows in one sheet now)
    var url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID + '/gviz/tq?tqx=out:json';
    var res = await fetch(url);
    var text = await res.text();
    var json = text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '');
    var data = JSON.parse(json);
    var rows = data.table.rows || [];

    if (rows.length === 0) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      ['totalVisits','todayVisits','uniqueIPs','totalClicks'].forEach(function(id){document.getElementById(id).textContent='0';});
      return;
    }

    // Parse all rows: [sid, ip, date, time, action, page, detail, duration, browser, os, screen, language, referrer]
    var allRows = [];
    for (var i = 0; i < rows.length; i++) {
      var r = rows[i].c;
      if (!r) continue;
      var sid = r[0] ? (r[0].v || '') : '';
      // Skip header row
      if (sid === 'Session ID') continue;
      allRows.push({
        sid:      sid,
        ip:       r[1] ? (r[1].v || '') : '',
        date:     r[2] ? (r[2].f || r[2].v || '') : '',
        time:     r[3] ? (r[3].f || r[3].v || '') : '',
        action:   r[4] ? (r[4].v || '') : '',
        page:     r[5] ? (r[5].v || '') : '',
        detail:   r[6] ? (r[6].v || '') : '',
        duration: r[7] ? (r[7].v || '') : '',
        browser:  r[8] ? (r[8].v || '') : '',
        os:       r[9] ? (r[9].v || '') : '',
        screen:   r[10] ? (r[10].v || '') : '',
        language: r[11] ? (r[11].v || '') : '',
        referrer: r[12] ? (r[12].v || '') : ''
      });
    }

    // Separate sessions (visit) from events (pageview, click, leave)
    var sessions = allRows.filter(function(r) { return r.action === 'visit'; });
    var events = allRows.filter(function(r) { return r.action !== 'visit' && r.action !== ''; });

    // Group events by session ID
    var eventMap = {};
    events.forEach(function(ev) {
      if (!ev.sid) return;
      if (!eventMap[ev.sid]) eventMap[ev.sid] = [];
      eventMap[ev.sid].push(ev);
    });

    if (sessions.length === 0) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      ['totalVisits','todayVisits','uniqueIPs','totalClicks'].forEach(function(id){document.getElementById(id).textContent='0';});
      return;
    }

    // Stats
    var today = new Date().toISOString().split('T')[0];
    var todayCount = sessions.filter(function(s) { return s.date === today; }).length;
    var uniqueIps = new Set(sessions.map(function(s) { return s.ip; }).filter(Boolean)).size;
    var totalClicks = events.filter(function(e) { return e.action === 'click'; }).length;

    document.getElementById('totalVisits').textContent = sessions.length;
    document.getElementById('todayVisits').textContent = todayCount;
    document.getElementById('uniqueIPs').textContent = uniqueIps;
    document.getElementById('totalClicks').textContent = totalClicks;

    // Build table (newest first)
    var tbody = document.getElementById('visitorRows');
    tbody.innerHTML = '';
    var reversed = sessions.slice().reverse();

    reversed.forEach(function(s, i) {
      var sessEvents = eventMap[s.sid] || [];
      var pageviews = sessEvents.filter(function(e) { return e.action === 'pageview'; }).length;
      var clicks = sessEvents.filter(function(e) { return e.action === 'click'; }).length;

      var tr = document.createElement('tr');
      tr.className = 'session-row';
      tr.dataset.idx = i;
      tr.innerHTML =
        '<td style="color:var(--text-muted);font-size:0.8rem;">' + (i+1) + '</td>' +
        '<td class="ip-cell">' + esc(s.ip) + '</td>' +
        '<td class="time-cell">' + esc(s.date) + '</td>' +
        '<td class="time-cell">' + esc(s.time) + '</td>' +
        '<td><span class="page-cell">' + esc(s.page) + '</span></td>' +
        '<td class="browser-cell">' + esc(s.browser) + '</td>' +
        '<td class="os-cell">' + esc(s.os) + '</td>' +
        '<td>' + pageviews + '</td>' +
        '<td>' + clicks + '</td>';
      tbody.appendChild(tr);

      // Detail row
      var detailTr = document.createElement('tr');
      detailTr.className = 'detail-row';
      detailTr.id = 'detail-' + i;
      var dh = '<td colspan="9"><div class="detail-panel">';
      dh += '<h4>Session Activity (' + esc(s.sid) + ')</h4>';

      if (sessEvents.length === 0) {
        dh += '<p class="no-events">No detailed events recorded for this session.</p>';
      } else {
        dh += '<ul class="event-list">';
        sessEvents.forEach(function(ev) {
          var icon, cls, label;
          if (ev.action === 'pageview') {
            icon = '📄'; cls = 'ev-pageview';
            label = 'Viewed <span class="page-cell">' + esc(ev.page) + '</span>';
          } else if (ev.action === 'click') {
            icon = '🔗'; cls = 'ev-click';
            label = 'Clicked <span class="ev-click-name">' + esc(ev.detail) + '</span> on <span class="page-cell">' + esc(ev.page) + '</span>';
          } else if (ev.action === 'leave') {
            icon = '🚪'; cls = 'ev-leave';
            label = 'Left <span class="page-cell">' + esc(ev.page) + '</span> — <span class="ev-duration">' + esc(ev.duration) + 's on page</span>';
          } else {
            icon = '•'; cls = 'ev-pageview';
            label = esc(ev.action) + ' ' + esc(ev.page);
          }
          dh += '<li class="' + cls + '"><span class="ev-icon">' + icon + '</span><span class="ev-detail">' + label + '</span><span class="ev-time">' + esc(ev.time) + '</span></li>';
        });
        dh += '</ul>';
      }
      dh += '</div></td>';
      detailTr.innerHTML = dh;
      tbody.appendChild(detailTr);

      tr.addEventListener('click', function() {
        var detail = document.getElementById('detail-' + this.dataset.idx);
        var isOpen = detail.classList.contains('show');
        document.querySelectorAll('.detail-row.show').forEach(function(el) { el.classList.remove('show'); });
        document.querySelectorAll('.session-row.expanded').forEach(function(el) { el.classList.remove('expanded'); });
        if (!isOpen) { detail.classList.add('show'); this.classList.add('expanded'); }
      });
    });

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('visitorTable').style.display = 'table';

  } catch(err) {
    document.getElementById('loadingState').innerHTML = '<span style="color:var(--accent3);">Error: ' + esc(err.message) + '</span>';
  }
}

loadAll();
</script>
</body>
</html>
