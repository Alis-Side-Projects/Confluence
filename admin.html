<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Confluence Analytics</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a26;
    --border: #2a2a3a;
    --text: #e4e4ed;
    --text-muted: #8888a0;
    --accent1: #6c5ce7;
    --accent2: #00cec9;
    --accent3: #fd79a8;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 24px;
  }
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 32px;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    background: linear-gradient(135deg, #6c5ce7, #00cec9);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .refresh-btn {
    padding: 8px 20px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text);
    cursor: pointer;
    font-size: 0.9rem;
    transition: all 0.2s;
  }
  .header .refresh-btn:hover {
    border-color: var(--accent1);
    background: var(--surface2);
  }
  .stats-row {
    display: flex;
    gap: 16px;
    margin-bottom: 32px;
    flex-wrap: wrap;
  }
  .stat-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px 24px;
    flex: 1;
    min-width: 150px;
  }
  .stat-card .label {
    font-size: 0.8rem;
    color: var(--text-muted);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 4px;
  }
  .stat-card .value {
    font-size: 2rem;
    font-weight: 800;
  }
  .stat-card .value.purple { color: var(--accent1); }
  .stat-card .value.teal { color: var(--accent2); }
  .stat-card .value.pink { color: var(--accent3); }
  .table-wrapper {
    overflow-x: auto;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
  }
  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.88rem;
  }
  th {
    text-align: left;
    padding: 14px 16px;
    background: var(--surface2);
    color: var(--text-muted);
    font-weight: 700;
    font-size: 0.75rem;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    white-space: nowrap;
    border-bottom: 1px solid var(--border);
    position: sticky;
    top: 0;
  }
  td {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(108,92,231,0.04); }
  .ip-cell { color: var(--accent2); font-family: monospace; }
  .time-cell { color: var(--text-muted); }
  .page-cell {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 0.78rem;
    background: rgba(108,92,231,0.1);
    color: #a78bfa;
  }
  .os-cell { color: var(--accent3); }
  .browser-cell { color: var(--accent2); }
  .loading {
    text-align: center;
    padding: 40px;
    color: var(--text-muted);
  }
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-muted);
  }
  .empty-state .icon { font-size: 3rem; margin-bottom: 12px; }
  .error-msg { color: var(--accent3); }
</style>
</head>
<body>

<div class="header">
  <h1>📊 Confluence Analytics</h1>
  <button class="refresh-btn" onclick="loadVisitors()">↻ Refresh</button>
</div>

<div class="stats-row">
  <div class="stat-card">
    <div class="label">Total Visits</div>
    <div class="value purple" id="totalVisits">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Today</div>
    <div class="value teal" id="todayVisits">—</div>
  </div>
  <div class="stat-card">
    <div class="label">Unique IPs</div>
    <div class="value pink" id="uniqueIPs">—</div>
  </div>
</div>

<div class="table-wrapper">
  <div class="loading" id="loadingState">Loading visitor data from Google Sheets...</div>
  <table id="visitorTable" style="display:none;">
    <thead>
      <tr>
        <th>#</th>
        <th>IP Address</th>
        <th>Date</th>
        <th>Time</th>
        <th>Page</th>
        <th>Browser</th>
        <th>OS</th>
        <th>Screen</th>
        <th>Language</th>
        <th>Referrer</th>
      </tr>
    </thead>
    <tbody id="visitorRows"></tbody>
  </table>
  <div class="empty-state" id="emptyState" style="display:none;">
    <div class="icon">👀</div>
    <p>No visitors yet. Data will appear here once someone visits the site.</p>
  </div>
</div>

<script>
// ============================================================
// Google Sheet ID (from your URL)
// ============================================================
const SHEET_ID = '1_CiIlQat2JN7YzbkY83Kbjq76zBjVFdcbm1tZFRdNHw';
const SHEET_NAME = 'Sheet1';
// ============================================================

function escHtml(str) {
  const div = document.createElement('div');
  div.textContent = str || '';
  return div.innerHTML;
}

async function loadVisitors() {
  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('visitorTable').style.display = 'none';
  document.getElementById('emptyState').style.display = 'none';

  try {
    // Use Google Sheets published CSV endpoint
    const url = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json&sheet=${SHEET_NAME}`;
    const res = await fetch(url);
    const text = await res.text();

    // Google wraps the JSON in a callback — strip it
    const jsonStr = text.replace(/^[^(]*\(/, '').replace(/\);?\s*$/, '');
    const data = JSON.parse(jsonStr);

    const rows = data.table.rows || [];
    const cols = data.table.cols || [];

    if (rows.length === 0) {
      document.getElementById('loadingState').style.display = 'none';
      document.getElementById('emptyState').style.display = 'block';
      document.getElementById('totalVisits').textContent = '0';
      document.getElementById('todayVisits').textContent = '0';
      document.getElementById('uniqueIPs').textContent = '0';
      return;
    }

    // Parse rows (skip header if first row looks like headers)
    const visitors = [];
    const firstIP = rows[0]?.c?.[0]?.v || '';
    const startIdx = (firstIP === 'IP Address' || firstIP === 'ip') ? 1 : 0;

    for (let i = startIdx; i < rows.length; i++) {
      const r = rows[i].c;
      if (!r) continue;
      visitors.push({
        ip:       r[0]?.v || '—',
        date:     r[1]?.f || r[1]?.v || '—',
        time:     r[2]?.f || r[2]?.v || '—',
        page:     r[3]?.v || '—',
        browser:  r[4]?.v || '—',
        os:       r[5]?.v || '—',
        screen:   r[6]?.v || '—',
        language: r[7]?.v || '—',
        referrer: r[8]?.v || '—'
      });
    }

    // Stats
    const today = new Date().toLocaleDateString('en-US', {year:'numeric', month:'2-digit', day:'2-digit'});
    const todayCount = visitors.filter(v => {
      try {
        const vDate = new Date(v.date).toLocaleDateString('en-US', {year:'numeric', month:'2-digit', day:'2-digit'});
        return vDate === today;
      } catch { return false; }
    }).length;
    const uniqueIps = new Set(visitors.map(v => v.ip).filter(v => v !== '—')).size;

    document.getElementById('totalVisits').textContent = visitors.length.toLocaleString();
    document.getElementById('todayVisits').textContent = todayCount.toLocaleString();
    document.getElementById('uniqueIPs').textContent = uniqueIps.toLocaleString();

    // Build table (newest first)
    const tbody = document.getElementById('visitorRows');
    tbody.innerHTML = '';

    const reversed = [...visitors].reverse();
    reversed.forEach((v, i) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td style="color:var(--text-muted);font-size:0.8rem;">${i + 1}</td>
        <td class="ip-cell">${escHtml(v.ip)}</td>
        <td class="time-cell">${escHtml(v.date)}</td>
        <td class="time-cell">${escHtml(v.time)}</td>
        <td><span class="page-cell">${escHtml(v.page)}</span></td>
        <td class="browser-cell">${escHtml(v.browser)}</td>
        <td class="os-cell">${escHtml(v.os)}</td>
        <td>${escHtml(v.screen)}</td>
        <td>${escHtml(v.language)}</td>
        <td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;color:var(--text-muted);font-size:0.8rem;">${escHtml(v.referrer)}</td>
      `;
      tbody.appendChild(tr);
    });

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('visitorTable').style.display = 'table';

  } catch (err) {
    document.getElementById('loadingState').innerHTML =
      `<span class="error-msg">Error loading data: ${escHtml(err.message)}<br><br>Make sure the Google Sheet is shared as "Anyone with the link can view".</span>`;
  }
}

loadVisitors();
</script>

</body>
</html>
